<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Sistema de Créditos {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: #1a1d20;
            color: white;
        }
        .sidebar a {
            color: #d1d1d1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .sidebar a:hover {
            background: #343a40;
            color: white;
        }
        .content {
            flex-grow: 1;
            padding: 30px;
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="text-center py-4">FINANTAXIS</h4>

        <a href="{% url 'dashboard' %}">🏠 Dashboard</a>
        <a href="{% url 'lista_creditos' %}">💼 Créditos</a>
        <a href="{% url 'cliente_detalle' %}">👤 Clientes</a>
        <a href="{% url 'buscar_vehiculo' %}">🚘 Vehículos</a>
        <a href="{% url 'crear_credito' %}">➕ Crear Crédito</a>
        <a href="{% url 'solicitudes_credito' %}">📄 Aprobaciones</a>
        <a href="{% url 'generar_solicitud_credito' %}">📄 Solicitud Credito</a>
        <a href="{% url 'simulador_credito' %}">👤 Simulador</a>
        <a href="{% url 'crear_cliente_creditos' %}">👤 Crear Cliente</a>
        <a href="{% url 'crear_vehiculo_creditos' %}">🚘 Crear Vehículo</a>
        <a href="{% url 'crear_prenda' %}">👤 Crear Acreedor</a>
        <a href="{% url 'recalcular_creditos' %}" class="bg-red-600 text-white px-4 py-2 rounded-lg">Recalcular todos los créditos</a>
        <a href="{% url 'reparar_sistema_financiero' %}"class="bg-yellow-600 text-white px-4 py-2 rounded-lg">🛠 Reparar Sistema Financiero</a>
    </div>

    <!-- CONTENIDO -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
